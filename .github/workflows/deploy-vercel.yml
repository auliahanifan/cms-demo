name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      ref:
        description: Branch, tag, or commit SHA to deploy
        required: false
        default: main

concurrency:
  group: vercel-${{ github.workflow }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: Production – vibecodingclass-cms
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set deploy flags
        id: flags
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "vercel_env=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "vercel_env=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.flags.outputs.vercel_env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ steps.flags.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt ${{ steps.flags.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}
